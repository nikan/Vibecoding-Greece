name: Add Project to README

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  add-project:
    if: github.event.label.name == 'project-submission'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project data
        id: project
        run: |
          echo "RAW_BODY_START"
          echo "${{ github.event.issue.body }}"
          echo "RAW_BODY_END"
          
          python3 << 'EOF'
          import os
          import re

          body = os.environ.get('ISSUE_BODY', '')
          github_output = os.environ['GITHUB_OUTPUT']

          def normalize_key(label):
              return re.sub(r'[^a-z0-9]+', '_', label.lower()).strip('_')

          def parse_sections(text):
              sections = {}
              current_label = None
              current_lines = []

              for line in text.splitlines():
                  heading = re.match(r'^\s{0,3}#{2,3}\s+(.+?)\s*$', line)
                  if heading:
                      if current_label is not None:
                          sections[current_label] = '\n'.join(current_lines).strip()
                      current_label = heading.group(1).strip()
                      current_lines = []
                  elif current_label is not None:
                      current_lines.append(line)

              if current_label is not None:
                  sections[current_label] = '\n'.join(current_lines).strip()

              return sections

          sections = parse_sections(body)

          project_name = sections.get('Project Name', '')
          project_url = sections.get('Project URL', '').splitlines()[0].strip()
          author = sections.get('Author Name', '')
          description = sections.get('Description', '')
          tech = sections.get('Technologies', '')
          category = sections.get('Category', '').splitlines()[0].strip()
          update_options = sections.get('Update Options', '')
          is_update = 'true' if '[x]' in update_options.lower() else 'false'
          category_map = {
              'Web development': 'web-development',
              'Mobile development': 'mobile-development',
              'Backend/APIs': 'backend/apis',
              'Data Science/ML': 'data-science/ml',
              'DevOps/Tools': 'devops/tools',
              'Other': 'other',
          }
          category_key = category_map.get(category, category.lower().replace(' ', '-'))

          values = {
              'name': project_name,
              'url': project_url,
              'author': author,
              'description': description,
              'tech': tech,
              'category': category,
              'category_key': category_key,
              'is_update': is_update,
          }

          with open(github_output, 'a', encoding='utf-8') as fh:
              for key, value in values.items():
                  safe_key = normalize_key(key)
                  fh.write(f'{safe_key}<<__VALUE__\n{value}\n__VALUE__\n')
          EOF
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Check for duplicates
        id: check
        run: |
          URL="${{ steps.project.outputs.url }}"
          IS_UPDATE="${{ steps.project.outputs.is_update }}"
          
          # Skip if URL is empty (parsing failed)
          if [ -z "$URL" ]; then
            echo "duplicate=true" >> $GITHUB_OUTPUT
            echo "ERROR: Could not extract project URL from issue"
            exit 1
          fi
          
          if grep -Fq -- "$URL" README.md; then
            if [ "$IS_UPDATE" = "true" ]; then
              echo "duplicate=false" >> $GITHUB_OUTPUT
              echo "Will update existing project"
            else
              echo "duplicate=true" >> $GITHUB_OUTPUT
              echo "Project already exists in README"
            fi
          else
            echo "duplicate=false" >> $GITHUB_OUTPUT
          fi

      - name: Update README (add new)
        if: steps.check.outputs.duplicate == 'false' && steps.project.outputs.is_update == 'false'
        run: |
          # Create the new entry
          ENTRY="### [${{ steps.project.outputs.name }}](${{ steps.project.outputs.url }})

          **Συγγραφέας**: ${{ steps.project.outputs.author }}  
          **Περιγραφή**: ${{ steps.project.outputs.description }}  
          **Τεχνολογίες**: ${{ steps.project.outputs.tech }}  
          **Κατάσταση**: Νέο
          
          "

          # Get category marker key
          CATEGORY_KEY="${{ steps.project.outputs.category_key }}"
          MARKER="<!-- CATEGORY:$CATEGORY_KEY:START -->"

          if ! grep -Fq -- "$MARKER" README.md; then
            echo "ERROR: Could not find category marker $MARKER"
            exit 1
          fi

          # Insert the entry after the category marker without relying on sed escaping
          awk -v marker="$MARKER" -v entry="$ENTRY" '
            {
              print
              if ($0 == marker) {
                print entry
              }
            }
          ' README.md > README.md.tmp && mv README.md.tmp README.md

      - name: Update README (update existing)
        if: steps.check.outputs.duplicate == 'false' && steps.project.outputs.is_update == 'true'
        run: |
          # Create the updated entry
          ENTRY="### [${{ steps.project.outputs.name }}](${{ steps.project.outputs.url }})

          **Συγγραφέας**: ${{ steps.project.outputs.author }}  
          **Περιγραφή**: ${{ steps.project.outputs.description }}  
          **Τεχνολογίες**: ${{ steps.project.outputs.tech }}  
          **Κατάσταση**: Ενημερώθηκε
          
          "

          URL="${{ steps.project.outputs.url }}"

          # Replace the existing entry (find line with the URL and replace the following lines)
          # This uses awk to find the URL line and replace the block until next ### or end
          awk -v entry="$ENTRY" '
            /^### \[.*\]\(https?:\/\// {
              if (index($0, url)) {
                found=1
                print entry
                next
              }
            }
            found && /^### \[/ { found=0 }
            !found { print }
          ' url="$URL" README.md > README.md.tmp && mv README.md.tmp README.md

      - name: Commit and push
        if: steps.check.outputs.duplicate == 'false'
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add README.md
          
          if [ "${{ steps.project.outputs.is_update }}" = "true" ]; then
            git commit -m "Update project from issue #${{ github.event.issue.number }}"
          else
            git commit -m "Add project from issue #${{ github.event.issue.number }}"
          fi
          git push

      - name: Close issue (duplicate)
        if: steps.check.outputs.duplicate == 'true'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "⚠️ This project already exists in the README. No changes made."
          gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close issue (success)
        if: steps.check.outputs.duplicate == 'false'
        run: |
          gh issue close ${{ github.event.issue.number }}
          gh issue edit ${{ github.event.issue.number }} --remove-label "project-submission"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
