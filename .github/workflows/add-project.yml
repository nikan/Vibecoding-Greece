name: Add Project to README

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  add-project:
    if: github.event.label.name == 'project-submission'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project data
        id: project
        run: |
          # Debug: print raw issue body to see actual format
          echo "=== RAW BODY START ==="
          echo "${{ github.event.issue.body }}"
          echo "=== RAW BODY END ==="
          
          # Save body to file for inspection
          echo "${{ github.event.issue.body }}" > /tmp/issue_body.txt
          
          # Try different parsing approaches
          python3 << 'EOF'
          import os

          body = os.environ.get('ISSUE_BODY', '')
          
          # Print what we received
          print("=== PARSED BODY ===")
          print(repr(body))
          print("=== END ===")

          # Try multiple patterns
          import re
          
          # Pattern 1: **Label**: value
          # Pattern 2: Label\r\n-----\r\nvalue
          # Pattern 3: just look for URLs
          
          urls = re.findall(r'https?://[^\s]+', body)
          print(f"Found URLs: {urls}")
          
          # Try to find Project URL label
          for pattern in [r'\*\*Project URL\*\*:\s*(.+)', r'Project URL\r?\n-+\r?\n(.+)', r'Project URL\r?\n(.+)']:
              matches = re.findall(pattern, body, re.MULTILINE | re.IGNORECASE)
              if matches:
                  print(f"Pattern {pattern} matched: {matches}")
          EOF
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Check for duplicates
        id: check
        run: |
          URL="${{ steps.project.outputs.url }}"
          IS_UPDATE="${{ steps.project.outputs.is_update }}"
          
          # Skip if URL is empty (parsing failed)
          if [ -z "$URL" ]; then
            echo "duplicate=true" >> $GITHUB_OUTPUT
            echo "ERROR: Could not extract project URL from issue"
            exit 1
          fi
          
          if grep -q "$URL" README.md; then
            if [ "$IS_UPDATE" = "true" ]; then
              echo "duplicate=false" >> $GITHUB_OUTPUT
              echo "Will update existing project"
            else
              echo "duplicate=true" >> $GITHUB_OUTPUT
              echo "Project already exists in README"
            fi
          else
            echo "duplicate=false" >> $GITHUB_OUTPUT
          fi

      - name: Update README (add new)
        if: steps.check.outputs.duplicate == 'false' && steps.project.outputs.is_update == 'false'
        run: |
          # Create the new entry
          ENTRY="### [${{ steps.project.outputs.name }}](${{ steps.project.outputs.url }})

          **Συγγραφέας**: ${{ steps.project.outputs.author }}  
          **Περιγραφή**: ${{ steps.project.outputs.description }}  
          **Τεχνολογίες**: ${{ steps.project.outputs.tech }}  
          **Κατάσταση**: Νέο
          
          "

          # Get category marker key
          CATEGORY_KEY="${{ steps.project.outputs.category_key }}"

          # Find the marker in README and insert after it
          sed -i "/<!-- CATEGORY:$CATEGORY_KEY:START -->/a\\$ENTRY" README.md

      - name: Update README (update existing)
        if: steps.check.outputs.duplicate == 'false' && steps.project.outputs.is_update == 'true'
        run: |
          # Create the updated entry
          ENTRY="### [${{ steps.project.outputs.name }}](${{ steps.project.outputs.url }})

          **Συγγραφέας**: ${{ steps.project.outputs.author }}  
          **Περιγραφή**: ${{ steps.project.outputs.description }}  
          **Τεχνολογίες**: ${{ steps.project.outputs.tech }}  
          **Κατάσταση**: Ενημερώθηκε
          
          "

          URL="${{ steps.project.outputs.url }}"

          # Replace the existing entry (find line with the URL and replace the following lines)
          # This uses awk to find the URL line and replace the block until next ### or end
          awk -v entry="$ENTRY" '
            /^### \[.*\]\(https?:\/\// {
              if (index($0, url)) {
                found=1
                print entry
                next
              }
            }
            found && /^### \[/ { found=0 }
            !found { print }
          ' url="$URL" README.md > README.md.tmp && mv README.md.tmp README.md

      - name: Commit and push
        if: steps.check.outputs.duplicate == 'false'
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add README.md
          
          if [ "${{ steps.project.outputs.is_update }}" = "true" ]; then
            git commit -m "Update project from issue #${{ github.event.issue.number }}"
          else
            git commit -m "Add project from issue #${{ github.event.issue.number }}"
          fi
          git push

      - name: Close issue (duplicate)
        if: steps.check.outputs.duplicate == 'true'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "⚠️ This project already exists in the README. No changes made."
          gh issue close ${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close issue (success)
        if: steps.check.outputs.duplicate == 'false'
        run: |
          gh issue close ${{ github.event.issue.number }}
          gh issue edit ${{ github.event.issue.number }} --remove-label "project-submission"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}